<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <!-- Gradient backgrounds -->
    <linearGradient id="lanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8e6c9" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="netbirdGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#bbdefb" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="internetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f8bbd0" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#43a047"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565c0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e65100"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7b1fa2"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#263238">Netzwerk &amp; DNS — NixOS Infrastructure</text>

  <!-- ═══ ZONES ═══ -->

  <!-- LAN Zone -->
  <rect x="30" y="55" width="520" height="440" rx="16" fill="url(#lanGrad)" stroke="#66bb6a" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="50" y="82" font-size="14" font-weight="bold" fill="#2e7d32">🏠 LAN — 192.168.178.0/24</text>

  <!-- NetBird Zone -->
  <rect x="30" y="510" width="1040" height="120" rx="16" fill="url(#netbirdGrad)" stroke="#42a5f5" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="50" y="537" font-size="14" font-weight="bold" fill="#1565c0">🔒 NetBird WireGuard Mesh (P2P-VPN)</text>

  <!-- Internet Zone -->
  <rect x="580" y="55" width="490" height="440" rx="16" fill="url(#internetGrad)" stroke="#ef5350" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="600" y="82" font-size="14" font-weight="bold" fill="#c62828">🌐 Internet</text>

  <!-- ═══ DEVICES ═══ -->

  <!-- FritzBox -->
  <rect x="60" y="100" width="200" height="90" rx="12" fill="#fff9c4" stroke="#f9a825" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="125" text-anchor="middle" font-size="15" font-weight="bold" fill="#f57f17">📡 FritzBox</text>
  <text x="160" y="145" text-anchor="middle" font-size="11" fill="#555">Gateway: 192.168.178.1</text>
  <text x="160" y="162" text-anchor="middle" font-size="11" fill="#555">DHCP → DNS: 192.168.178.10</text>
  <text x="160" y="179" text-anchor="middle" font-size="10" fill="#888">Internet-Uplink</text>

  <!-- Homeserver -->
  <rect x="60" y="240" width="240" height="230" rx="12" fill="#ffffff" stroke="#43a047" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="180" y="268" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">🖥️ Homeserver</text>
  <text x="180" y="288" text-anchor="middle" font-size="11" fill="#555">192.168.178.10 (LAN)</text>
  <text x="180" y="305" text-anchor="middle" font-size="11" fill="#1565c0">100.95.103.67 (NetBird)</text>
  <line x1="80" y1="318" x2="280" y2="318" stroke="#e0e0e0" stroke-width="1"/>
  <text x="85" y="336" font-size="11" font-weight="bold" fill="#333">Dienste:</text>
  <text x="85" y="352" font-size="10" fill="#555">Caddy :443 (TLS internal)</text>
  <text x="85" y="366" font-size="10" fill="#555">Immich :2283 | Nextcloud :8080</text>
  <text x="85" y="380" font-size="10" fill="#555">Paperless :8000 | Grafana :3000</text>
  <text x="85" y="394" font-size="10" fill="#555">Vaultwarden :8222 | Samba :445</text>
  <text x="85" y="408" font-size="10" fill="#555">Restic REST :8100 (NetBird)</text>
  <line x1="80" y1="416" x2="280" y2="416" stroke="#e0e0e0" stroke-width="1"/>
  <text x="85" y="432" font-size="11" font-weight="bold" fill="#7b1fa2">DNS (dnsmasq):</text>
  <text x="85" y="448" font-size="10" fill="#7b1fa2">*.home.lan → 192.168.178.10</text>
  <text x="85" y="462" font-size="10" fill="#7b1fa2">Interfaces: enp1s0, nb-wt0</text>

  <!-- Laptop -->
  <rect x="340" y="240" width="200" height="200" rx="12" fill="#ffffff" stroke="#1565c0" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="440" y="268" text-anchor="middle" font-size="16" font-weight="bold" fill="#1565c0">💻 ThinkPad P15</text>
  <text x="440" y="288" text-anchor="middle" font-size="11" fill="#555">DHCP (192.168.178.x)</text>
  <text x="440" y="305" text-anchor="middle" font-size="11" fill="#1565c0">NetBird (nb-wt0)</text>
  <line x1="355" y1="318" x2="525" y2="318" stroke="#e0e0e0" stroke-width="1"/>
  <text x="355" y="336" font-size="11" font-weight="bold" fill="#333">Hardware:</text>
  <text x="355" y="352" font-size="10" fill="#555">RTX A4000 8GB, i9, 32GB</text>
  <text x="355" y="366" font-size="10" fill="#555">Podman + nvidia-toolkit</text>
  <line x1="355" y1="380" x2="525" y2="380" stroke="#e0e0e0" stroke-width="1"/>
  <text x="355" y="398" font-size="11" font-weight="bold" fill="#7b1fa2">DNS (systemd-resolved):</text>
  <text x="355" y="414" font-size="10" fill="#7b1fa2">~home.lan → 100.95.103.67</text>
  <text x="355" y="430" font-size="10" fill="#7b1fa2">Rest → DHCP (FritzBox)</text>

  <!-- VPS -->
  <rect x="640" y="100" width="220" height="210" rx="12" fill="#ffffff" stroke="#c62828" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="750" y="128" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">☁️ VPS Hetzner</text>
  <text x="750" y="148" text-anchor="middle" font-size="11" fill="#555">157.90.239.236 (Nürnberg)</text>
  <text x="750" y="165" text-anchor="middle" font-size="11" fill="#1565c0">NetBird (nb-wt0)</text>
  <line x1="655" y1="178" x2="845" y2="178" stroke="#e0e0e0" stroke-width="1"/>
  <text x="655" y="196" font-size="11" font-weight="bold" fill="#333">Dienste:</text>
  <text x="655" y="212" font-size="10" fill="#555">Caddy (Let's Encrypt)</text>
  <text x="655" y="226" font-size="10" fill="#555">Fail2ban (SSH :2222)</text>
  <text x="655" y="240" font-size="10" fill="#555">Auto-Upgrade (04:30)</text>
  <line x1="655" y1="252" x2="845" y2="252" stroke="#e0e0e0" stroke-width="1"/>
  <text x="655" y="270" font-size="11" font-weight="bold" fill="#e65100">Reverse Proxy:</text>
  <text x="655" y="286" font-size="10" fill="#e65100">*.philipjonasch.de</text>
  <text x="655" y="300" font-size="10" fill="#e65100">→ NetBird → Homeserver</text>

  <!-- Phones -->
  <rect x="640" y="350" width="220" height="120" rx="12" fill="#ffffff" stroke="#78909c" stroke-width="2" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="750" y="378" text-anchor="middle" font-size="15" font-weight="bold" fill="#78909c">📱 Phones (geplant)</text>
  <text x="750" y="398" text-anchor="middle" font-size="11" fill="#999">GrapheneOS + Samsung</text>
  <text x="750" y="418" text-anchor="middle" font-size="11" fill="#999">NetBird einrichten</text>
  <text x="750" y="438" text-anchor="middle" font-size="11" fill="#999">Caddy CA installieren</text>
  <text x="750" y="458" text-anchor="middle" font-size="10" fill="#bbb">(noch nicht konfiguriert)</text>

  <!-- Users (Internet) -->
  <rect x="900" y="100" width="140" height="70" rx="12" fill="#ffffff" stroke="#e65100" stroke-width="2" filter="url(#shadow)"/>
  <text x="970" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#e65100">🌍 Browser</text>
  <text x="970" y="148" text-anchor="middle" font-size="10" fill="#555">*.philipjonasch.de</text>
  <text x="970" y="163" text-anchor="middle" font-size="10" fill="#555">HTTPS (Let's Encrypt)</text>

  <!-- NetBird nodes in mesh zone -->
  <circle cx="180" cy="570" r="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="180" y="574" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Server</text>
  <text x="180" y="608" text-anchor="middle" font-size="9" fill="#1565c0">100.95.103.67</text>

  <circle cx="550" cy="570" r="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="550" y="574" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">Laptop</text>

  <circle cx="920" cy="570" r="28" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="920" y="574" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">VPS</text>

  <!-- ═══ CONNECTIONS ═══ -->

  <!-- FritzBox → Homeserver (DHCP DNS) -->
  <line x1="160" y1="190" x2="160" y2="240" stroke="#f9a825" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="100" y="220" font-size="9" fill="#f57f17" font-weight="bold">DHCP DNS</text>

  <!-- FritzBox → Laptop (DHCP) -->
  <line x1="260" y1="155" x2="340" y2="260" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="285" y="195" font-size="9" fill="#f57f17">DHCP</text>

  <!-- Homeserver ↔ Laptop (LAN) -->
  <line x1="300" y1="340" x2="340" y2="340" stroke="#43a047" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="305" y="330" font-size="9" fill="#2e7d32" font-weight="bold">LAN</text>

  <!-- Laptop DNS → Homeserver (Split-DNS home.lan) -->
  <path d="M 370 420 Q 320 490 240 460" fill="none" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <text x="270" y="495" font-size="9" fill="#7b1fa2" font-weight="bold">*.home.lan (Split-DNS)</text>

  <!-- NetBird mesh connections -->
  <line x1="208" y1="570" x2="522" y2="570" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="578" y1="570" x2="892" y2="570" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="365" y="560" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">WireGuard P2P</text>
  <text x="735" y="560" text-anchor="middle" font-size="10" fill="#1565c0" font-weight="bold">WireGuard P2P</text>

  <!-- Homeserver → NetBird node -->
  <line x1="180" y1="470" x2="180" y2="542" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Laptop → NetBird node -->
  <line x1="440" y1="440" x2="550" y2="542" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- VPS → NetBird node -->
  <line x1="750" y1="310" x2="920" y2="542" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Internet → VPS -->
  <line x1="900" y1="140" x2="860" y2="140" stroke="#e65100" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="870" y="130" font-size="9" fill="#e65100" font-weight="bold">HTTPS</text>

  <!-- VPS → Homeserver (NetBird Tunnel) -->
  <path d="M 640 280 Q 500 320 300 350" fill="none" stroke="#e65100" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="460" y="290" font-size="9" fill="#e65100" font-weight="bold">Reverse Proxy via NetBird</text>

  <!-- ═══ LEGEND ═══ -->
  <rect x="30" y="645" width="1040" height="120" rx="12" fill="#fff" stroke="#bdbdbd" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="672" font-size="14" font-weight="bold" fill="#333">Legende</text>

  <!-- Row 1 -->
  <line x1="50" y1="692" x2="90" y2="692" stroke="#43a047" stroke-width="2.5"/>
  <text x="95" y="696" font-size="11" fill="#555">LAN-Verbindung</text>

  <line x1="250" y1="692" x2="290" y2="692" stroke="#1565c0" stroke-width="2.5"/>
  <text x="295" y="696" font-size="11" fill="#555">NetBird WireGuard</text>

  <line x1="480" y1="692" x2="520" y2="692" stroke="#e65100" stroke-width="2.5"/>
  <text x="525" y="696" font-size="11" fill="#555">Internet / Reverse Proxy</text>

  <line x1="740" y1="692" x2="780" y2="692" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="785" y="696" font-size="11" fill="#555">DNS-Auflösung</text>

  <!-- Row 2 -->
  <rect x="50" y="710" width="14" height="14" rx="3" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="70" y="722" font-size="11" fill="#555">LAN-Zone</text>

  <rect x="250" y="710" width="14" height="14" rx="3" fill="#e3f2fd" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="270" y="722" font-size="11" fill="#555">VPN-Zone</text>

  <rect x="480" y="710" width="14" height="14" rx="3" fill="#fce4ec" stroke="#ef5350" stroke-width="1.5"/>
  <text x="500" y="722" font-size="11" fill="#555">Internet-Zone</text>

  <rect x="740" y="710" width="14" height="14" rx="3" fill="#fff" stroke="#78909c" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="760" y="722" font-size="11" fill="#555">Geplant (noch nicht aktiv)</text>

  <!-- DNS flow detail -->
  <text x="50" y="752" font-size="11" fill="#333" font-weight="bold">DNS-Kette:</text>
  <text x="145" y="752" font-size="11" fill="#7b1fa2">Client → dnsmasq (Homeserver) → *.home.lan = 192.168.178.10</text>
  <text x="700" y="752" font-size="11" fill="#f57f17">| alles andere → FritzBox → Internet</text>
</svg>
